  <g font-size="10" fill="#6e7480" transform="translate(879,742)">
    <text x="0" y="0">menos</text>
    <rect x="44" y="-9" width="11" height="11" rx="2" fill="#ed935533"/>
    <rect x="59" y="-9" width="11" height="11" rx="2" fill="#ed935577"/>
