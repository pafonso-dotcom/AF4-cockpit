  <rect x="230" y="972" width="150" height="30" rx="8" fill="#ed9355"/>
  <text x="305" y="992" font-size="12" font-weight="600" fill="#23272E" text-anchor="middle">+ Nova transação</text>
  <text x="612" y="874" font-size="11" fill="#ed9355" text-anchor="end">⑦ ilustração + CTA</text>

