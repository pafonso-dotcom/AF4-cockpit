      <rect x="28" y="0"  width="22" height="22" rx="4" fill="#ed9355ee"/>
      <rect x="56" y="0"  width="22" height="22" rx="4" fill="#ed935522"/>
      <rect x="84" y="0"  width="22" height="22" rx="4" fill="#ed935577"/>
      <rect x="112" y="0" width="22" height="22" rx="4" fill="#ed9355bb"/>
      <rect x="140" y="0" width="22" height="22" rx="4" fill="#ed935533"/>
      <rect x="168" y="0" width="22" height="22" rx="4" fill="#ed935599"/>
    </g>
    <g transform="translate(0,56)">
