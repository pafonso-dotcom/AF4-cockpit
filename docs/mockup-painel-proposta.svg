      <rect x="28" y="0"  width="22" height="22" rx="4" fill="#ed935533"/>
      <rect x="56" y="0"  width="22" height="22" rx="4" fill="#ed935566"/>
      <rect x="84" y="0"  width="22" height="22" rx="4" fill="#ed9355ff"/>
      <rect x="112" y="0" width="22" height="22" rx="4" fill="#ed935544"/>
      <rect x="140" y="0" width="22" height="22" rx="4" fill="#ed935588"/>
      <rect x="168" y="0" width="22" height="22" rx="4" fill="#ed935522"/>
    </g>
    <g transform="translate(0,84)">
      <rect x="0"  y="0"  width="22" height="22" rx="4" fill="#ed935566"/>
      <rect x="28" y="0"  width="22" height="22" rx="4" fill="#ed935599"/>
      <rect x="56" y="0"  width="22" height="22" rx="4" fill="#ed9355dd"/>
      <rect x="84" y="0"  width="22" height="22" rx="4" fill="#ed935533"/>
      <rect x="112" y="0" width="22" height="22" rx="4" fill="#ed935577"/>
      <rect x="140" y="0" width="22" height="22" rx="4" fill="#ed9355bb"/>
      <rect x="168" y="0" width="22" height="22" rx="4" fill="#ed935544"/>
    </g>
