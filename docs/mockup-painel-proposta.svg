    <rect x="250" y="660" width="10" height="10" rx="2" fill="#60a5fa"/><text x="268" y="669">FIIs 25%</text>
    <rect x="250" y="684" width="10" height="10" rx="2" fill="#4ade80"/><text x="268" y="693">Renda Fixa 18%</text>
    <rect x="250" y="708" width="10" height="10" rx="2" fill="#fbbf24"/><text x="268" y="717">Cripto 15%</text>
  </g>
  <text x="410" y="582" font-size="11" fill="#ed9355" text-anchor="end">④ donut c/ centro</text>

  <!-- gauge meta -->
  <g filter="url(#soft)"><rect x="445" y="552" width="389" height="270" rx="16" fill="#2d323b" stroke="#343a44"/></g>
  <text x="465" y="582" font-family="Georgia, serif" font-size="16" font-weight="600" fill="#f5f5f7">Meta · Reserva</text>
  <g transform="translate(639,712)">
    <path d="M -120 0 A 120 120 0 0 1 120 0" fill="none" stroke="#343a44" stroke-width="20" stroke-linecap="round"/>
    <path d="M -120 0 A 120 120 0 0 1 96 -72" fill="none" stroke="#ed9355" stroke-width="20" stroke-linecap="round"/>
    <text x="0" y="-26" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#f5f5f7" text-anchor="middle">68%</text>
    <text x="0" y="0" font-size="11.5" fill="#a3a8b3" text-anchor="middle">R$ 34.000 / R$ 50.000</text>
  </g>
  <text x="639" y="800" font-size="11" fill="#86efac" text-anchor="middle">faltam R$ 16.000 · no ritmo, conclui em set/26</text>
  <text x="824" y="582" font-size="11" fill="#ed9355" text-anchor="end">⑤ gauge radial de meta</text>

