    <g>
      <rect x="0"  y="0"  width="22" height="22" rx="4" fill="#ed935522"/>
      <rect x="28" y="0"  width="22" height="22" rx="4" fill="#ed935544"/>
      <rect x="56" y="0"  width="22" height="22" rx="4" fill="#ed935588"/>
      <rect x="84" y="0"  width="22" height="22" rx="4" fill="#ed9355cc"/>
      <rect x="112" y="0" width="22" height="22" rx="4" fill="#ed935533"/>
      <rect x="140" y="0" width="22" height="22" rx="4" fill="#ed935566"/>
