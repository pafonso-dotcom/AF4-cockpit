  <text x="52" y="582" font-family="Georgia, serif" font-size="16" font-weight="600" fill="#f5f5f7">Alocação por Classe</text>
  <g transform="translate(150,700)">
    <circle r="64" fill="none" stroke="#343a44" stroke-width="22"/>
    <!-- segments via dasharray (circumference ~ 402) -->
    <circle r="64" fill="none" stroke="#ed9355" stroke-width="22" stroke-dasharray="169 233" transform="rotate(-90)"/>
    <circle r="64" fill="none" stroke="#60a5fa" stroke-width="22" stroke-dasharray="101 301" stroke-dashoffset="-169" transform="rotate(-90)"/>
    <circle r="64" fill="none" stroke="#4ade80" stroke-width="22" stroke-dasharray="72 330" stroke-dashoffset="-270" transform="rotate(-90)"/>
    <circle r="64" fill="none" stroke="#fbbf24" stroke-width="22" stroke-dasharray="60 342" stroke-dashoffset="-342" transform="rotate(-90)"/>
    <text x="0" y="-4" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#f5f5f7" text-anchor="middle">42%</text>
    <text x="0" y="16" font-size="10.5" fill="#a3a8b3" text-anchor="middle">Ações</text>
  </g>
  <g font-size="11" fill="#a3a8b3">
