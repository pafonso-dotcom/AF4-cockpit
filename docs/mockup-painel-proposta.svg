<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1060" viewBox="0 0 1280 1060" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#23272E"/>
      <stop offset="1" stop-color="#1d2127"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d2818"/>
      <stop offset="1" stop-color="#1a3a26"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sparkO" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ed9355" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ed9355" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- canvas -->
  <rect width="1280" height="1060" fill="url(#bg)"/>

  <!-- top bar -->
  <text x="32" y="40" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#f5f5f7">A<tspan fill="#ed9355">finanças</tspan></text>
  <text x="200" y="39" font-size="12.5" fill="#a3a8b3">Painel</text>
  <text x="270" y="39" font-size="12.5" fill="#6e7480">Contas</text>
  <text x="340" y="39" font-size="12.5" fill="#6e7480">Centro de controle</text>
  <text x="490" y="39" font-size="12.5" fill="#6e7480">Investimentos</text>
  <circle cx="1230" cy="34" r="16" fill="#ed9355"/>
  <text x="1230" y="39" font-size="13" font-weight="700" fill="#23272E" text-anchor="middle">P</text>

  <!-- mockup tag -->
  <rect x="32" y="58" width="290" height="22" rx="11" fill="#ed935522" stroke="#ed935566"/>
  <text x="44" y="73" font-size="11.5" fill="#ed9355" letter-spacing="1">PROPOSTA VISUAL · MOCKUP</text>

  <!-- greeting -->
  <text x="32" y="124" font-family="Georgia, serif" font-size="32" font-weight="600" fill="#f5f5f7">Boa noite, Paulo<tspan font-style="italic" fill="#ed9355"> 👋</tspan></text>
  <text x="32" y="148" font-size="13.5" fill="#a3a8b3">Aqui está o resumo da sua vida financeira.</text>
  <text x="640" y="116" font-size="11" fill="#ed9355" text-anchor="end">①  título em fonte display (serif real)</text>

  <!-- ===== ROW 1: hero + próximo compromisso ===== -->
  <!-- hero patrimonio -->
  <g filter="url(#soft)">
    <rect x="32" y="172" width="780" height="210" rx="20" fill="url(#hero)"/>
  </g>
  <text x="56" y="206" font-size="12.5" fill="#86efac" letter-spacing="0.5">Patrimônio Total</text>
  <text x="56" y="252" font-family="Georgia, serif" font-size="46" font-weight="700" fill="#ffffff" letter-spacing="-1">R$ 1.171.020<tspan font-size="26" fill="#cde6d6">,33</tspan></text>
  <text x="56" y="276" font-size="12.5" fill="#86efac">↗ 2,14% <tspan fill="#ffffff" fill-opacity="0.55">vs mês anterior</tspan></text>

  <!-- count-up note -->
  <text x="320" y="206" font-size="11" fill="#9fe9bd" opacity="0.9">② número anima (count-up) ao revelar</text>

  <!-- breakdown -->
  <g font-size="12" fill="#d7f0e0">
    <text x="56" y="312">Contas</text><text x="300" y="312" text-anchor="end" font-weight="600">+ R$ 585.630</text>
    <text x="56" y="332">A receber (ano)</text><text x="300" y="332" text-anchor="end" font-weight="600">+ R$ 704.950</text>
    <text x="56" y="352">Investimentos (BR)</text><text x="300" y="352" text-anchor="end" font-weight="600">+ R$ 41.499</text>
    <text x="56" y="372">A pagar (ano)</text><text x="300" y="372" text-anchor="end" font-weight="600" fill="#fca5a5">− R$ 161.058</text>
  </g>

  <!-- hero area sparkline -->
  <path d="M430 360 L470 350 L510 356 L550 338 L590 344 L630 322 L670 330 L710 300 L760 288 L788 296 L788 382 L430 382 Z" fill="url(#spark)"/>
  <path d="M430 360 L470 350 L510 356 L550 338 L590 344 L630 322 L670 330 L710 300 L760 288 L788 296" fill="none" stroke="#22c55e" stroke-width="2"/>
  <text x="788" y="214" font-size="11" fill="#86efac" text-anchor="end">evolução 12 meses</text>

  <!-- proximo compromisso -->
  <g filter="url(#soft)"><rect x="836" y="172" width="412" height="210" rx="20" fill="#2d323b" stroke="#343a44"/></g>
  <text x="860" y="204" font-size="12.5" fill="#a3a8b3">⚠  Próximo compromisso</text>
  <text x="860" y="246" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#f5f5f7">R$ 2.553,00</text>
  <text x="860" y="270" font-size="12" fill="#f87171">BOA BOLA · atrasado · 15/07</text>
  <line x1="860" y1="294" x2="1224" y2="294" stroke="#343a44"/>
  <text x="860" y="322" font-size="12" fill="#a3a8b3">Total a pagar · mês (8)</text>
  <text x="1224" y="322" font-size="15" font-weight="700" fill="#f87171" text-anchor="end">R$ 161.058</text>
  <!-- mini bars of upcoming -->
  <g fill="#ed9355" opacity="0.85">
    <rect x="860" y="344" width="14" height="22" rx="3"/>
    <rect x="884" y="338" width="14" height="28" rx="3"/>
    <rect x="908" y="350" width="14" height="16" rx="3"/>
    <rect x="932" y="332" width="14" height="34" rx="3"/>
    <rect x="956" y="348" width="14" height="18" rx="3"/>
  </g>
  <text x="1224" y="362" font-size="10.5" fill="#6e7480" text-anchor="end">próximos vencimentos</text>

  <!-- ===== ROW 2: KPIs com sparkline ===== -->
  <g>
    <!-- card 1 -->
    <g filter="url(#soft)"><rect x="32" y="402" width="389" height="128" rx="16" fill="#2d323b" stroke="#343a44"/></g>
    <text x="52" y="430" font-size="11.5" fill="#a3a8b3">Total em Contas</text>
    <text x="52" y="462" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#f5f5f7">R$ 585.630</text>
    <text x="52" y="482" font-size="10.5" fill="#6e7480">6 contas ativas</text>
    <path d="M250 500 L270 494 L290 498 L310 486 L330 490 L350 478 L370 482 L390 470 L405 474 L405 512 L250 512 Z" fill="url(#spark)"/>
    <path d="M250 500 L270 494 L290 498 L310 486 L330 490 L350 478 L370 482 L390 470 L405 474" fill="none" stroke="#4ade80" stroke-width="1.6"/>

    <!-- card 2 -->
    <g filter="url(#soft)"><rect x="445" y="402" width="389" height="128" rx="16" fill="#2d323b" stroke="#343a44"/></g>
    <text x="465" y="430" font-size="11.5" fill="#a3a8b3">A Receber</text>
    <text x="465" y="462" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#f5f5f7">R$ 704.950</text>
    <text x="465" y="482" font-size="10.5" fill="#6e7480">40 em aberto</text>
    <path d="M663 502 L683 498 L703 492 L723 496 L743 484 L763 488 L783 476 L803 472 L818 468 L818 512 L663 512 Z" fill="url(#sparkO)"/>
    <path d="M663 502 L683 498 L703 492 L723 496 L743 484 L763 488 L783 476 L803 472 L818 468" fill="none" stroke="#ed9355" stroke-width="1.6"/>

    <!-- card 3 -->
    <g filter="url(#soft)"><rect x="859" y="402" width="389" height="128" rx="16" fill="#2d323b" stroke="#343a44"/></g>
    <text x="879" y="430" font-size="11.5" fill="#a3a8b3">Proventos · mês</text>
    <text x="879" y="462" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#f5f5f7">R$ 3.180</text>
    <text x="879" y="482" font-size="10.5" fill="#6e7480">receita passiva</text>
    <g fill="#4ade80" opacity="0.85">
      <rect x="1085" y="492" width="12" height="20" rx="2"/>
      <rect x="1105" y="486" width="12" height="26" rx="2"/>
      <rect x="1125" y="498" width="12" height="14" rx="2"/>
      <rect x="1145" y="480" width="12" height="32" rx="2"/>
      <rect x="1165" y="490" width="12" height="22" rx="2"/>
      <rect x="1185" y="476" width="12" height="36" rx="2"/>
      <rect x="1205" y="488" width="12" height="24" rx="2"/>
      <rect x="1225" y="494" width="12" height="18" rx="2"/>
    </g>
  </g>
  <text x="1248" y="396" font-size="11" fill="#ed9355" text-anchor="end">③ sparkline de tendência em cada KPI</text>

