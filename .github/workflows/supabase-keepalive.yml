name: Supabase Keep-Alive

# Faz um ping diário no Supabase pra o projeto NÃO pausar (plano grátis pausa
# após ~7 dias sem atividade). Precisa dos secrets SUPABASE_URL e
# SUPABASE_ANON_KEY em: Settings -> Secrets and variables -> Actions.

on:
  schedule:
    - cron: "17 12 * * *"   # todo dia, 12:17 UTC
  workflow_dispatch: {}       # permite rodar manualmente pra testar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (mantém acordado)
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "Defina os secrets SUPABASE_URL e SUPABASE_ANON_KEY em Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/")
          echo "Supabase respondeu HTTP $code"
          # Qualquer resposta (200/400/401/404...) significa que o servidor está
          # ACORDADO. Só "000" (sem resposta) indica projeto fora do ar.
          if [ "$code" = "000" ]; then
            echo "Sem resposta do Supabase — verifique a URL / se está pausado."
            exit 1
          fi
          echo "OK — projeto acordado."
