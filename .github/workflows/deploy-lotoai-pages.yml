name: Deploy LOTOAI to GitHub Pages

# Builda o LOTOAI APP PRO mobile e publica na branch gh-pages-lotoai.
# O GitHub Pages serve direto dessa branch (sem precisar de permissões
# admin extras que actions/deploy-pages exige).
#
# Pre-req único no GitHub UI (Settings → Pages):
#   Source: "Deploy from a branch"
#   Branch: "gh-pages-lotoai" / "(root)"
#
# Triggers:
# - Push em arquivos do app
# - Manual via workflow_dispatch

on:
  push:
    branches:
      - main
      - claude/lotoai-app-pro-mobile-8AiS8
    paths:
      - 'apps/lotoai-mobile/**'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-lotoai-pages.yml'
  workflow_dispatch:

permissions:
  contents: write   # pra push na branch gh-pages-lotoai

concurrency:
  group: pages-lotoai
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # versão vem do "packageManager" do package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build LOTOAI
        run: pnpm --filter @repo/lotoai-mobile build

      - name: SPA 404 fallback + Jekyll bypass
        run: |
          cp apps/lotoai-mobile/dist/index.html apps/lotoai-mobile/dist/404.html
          touch apps/lotoai-mobile/dist/.nojekyll

      - name: Publish to gh-pages-lotoai branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/lotoai-mobile/dist
          publish_branch: gh-pages-lotoai
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: |
            deploy: ${{ github.event.head_commit.message || 'manual trigger' }}

            source: ${{ github.sha }}
