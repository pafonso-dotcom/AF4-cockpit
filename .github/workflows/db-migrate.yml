name: Supabase DB Migrate

# Aplica migrações SQL no Supabase quando arquivos em supabase/migrations/ mudam.
# Também pode rodar manualmente via Actions tab (workflow_dispatch).
#
# Requer 2 secrets no repo (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  — Personal Access Token de https://supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD   — senha do banco (Settings → Database → Connection String)
#
# O project ref já está em supabase/config.toml (project_id = "rffxplwshwfjnedefvqg").

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**.sql'
      - 'supabase/config.toml'
      - '.github/workflows/db-migrate.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (só mostra diff, não aplica)'
        type: boolean
        default: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate config + secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN não está configurado nos secrets do repo."
            echo "Crie em: https://supabase.com/dashboard/account/tokens"
            echo "Adicione em: Settings → Secrets and variables → Actions"
            exit 1
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::SUPABASE_DB_PASSWORD não está configurado nos secrets do repo."
            echo "Pegue em: https://supabase.com/dashboard/project/_/settings/database"
            exit 1
          fi
          PROJECT_ID=$(grep '^project_id' supabase/config.toml | cut -d'"' -f2)
          if [ -z "$PROJECT_ID" ]; then
            echo "::error::project_id não encontrado em supabase/config.toml"
            exit 1
          fi
          echo "PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV
          echo "✓ Config OK · project: $PROJECT_ID"

      - name: Link to Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "$PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Show pending migrations (always)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "### Migrações locais"
          ls -la supabase/migrations/ || true
          echo ""
          echo "### Diff vs remoto"
          supabase db diff --use-migra || true

      - name: Apply migrations
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "Aplicando migrações no Supabase remoto…"
          supabase db push --password "$SUPABASE_DB_PASSWORD"
          echo "✓ Migração concluída"

      - name: Dry-run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "::warning::Dry-run ativado — nenhuma migração foi aplicada."
          echo "Pra aplicar de verdade, re-rode sem dry_run ou faça push pra main."

      - name: Summary
        if: always()
        run: |
          echo "## Resumo" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Project: \`$PROJECT_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "Trigger: \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Dry-run: \`${{ github.event.inputs.dry_run || 'false' }}\`" >> $GITHUB_STEP_SUMMARY
