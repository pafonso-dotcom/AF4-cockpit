name: Supabase DB Migrate

# Aplica migrações SQL no Supabase usando psql direto.
# Mais simples que supabase CLI: não precisa de PAT, só da Connection String do DB.
#
# Requer 1 secret no repo (Settings → Secrets and variables → Actions):
#   SUPABASE_DB_URL — Connection String em formato URI, pegue em:
#     https://supabase.com/dashboard/project/_/settings/database
#     → "Connection string" → tab "URI" → copia (já vem com senha incluída)
#     Formato: postgresql://postgres:[YOUR-PASSWORD]@db.[ref].supabase.co:5432/postgres
#
# Como funciona:
# - Cada arquivo .sql em supabase/migrations/ é aplicado em ordem alfabética
# - Todas as migrations são IDEMPOTENTES (usam IF NOT EXISTS) — rodar 2x não quebra
# - Registra qual rodou em tabela _supabase_migrations (criada na 1ª execução)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**.sql'
      - '.github/workflows/db-migrate.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (só lista migrations pendentes, não aplica)'
        type: boolean
        default: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client
          psql --version

      - name: Validate secret
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::SUPABASE_DB_URL não está configurado nos secrets do repo."
            echo ""
            echo "Como obter:"
            echo "1. https://supabase.com/dashboard/project/maqlnsivmreagpkhbkbn/settings/database"
            echo "2. Em 'Connection string' → tab 'Session' (NÃO 'Direct')"
            echo "3. Adiciona em https://github.com/pafonso-dotcom/AF4-cockpit/settings/secrets/actions"
            echo "   Nome: SUPABASE_DB_URL"
            exit 1
          fi
          # Trim de whitespace acidental
          TRIMMED=$(echo "$SUPABASE_DB_URL" | xargs)
          if [ -z "$TRIMMED" ]; then
            echo "::error::SUPABASE_DB_URL contém apenas whitespace."
            exit 1
          fi
          # Debug: tamanho + prefixo mascarado (NÃO mostra a senha)
          LEN=${#TRIMMED}
          PREFIX=$(echo "$TRIMMED" | cut -c1-30)
          echo "✓ Secret presente · tamanho: $LEN chars · prefixo: $PREFIX..."

          # Valida formato
          if ! echo "$TRIMMED" | grep -qE '^postgres(ql)?://'; then
            echo "::error::SUPABASE_DB_URL não começa com 'postgres://' ou 'postgresql://'."
            echo "Formato esperado: postgresql://postgres.REF:SENHA@HOST:PORTA/postgres"
            exit 1
          fi

          # Detecta Direct Connection (host db.X.supabase.co) — só IPv6, runner não tem
          if echo "$TRIMMED" | grep -qE '@db\.[a-z0-9]+\.supabase\.co'; then
            echo "::error::Você está usando a 'Direct Connection' (host db.X.supabase.co)."
            echo "::error::GitHub Actions runners NÃO têm IPv6, e esse host só responde em IPv6."
            echo "::error::Troque pela 'Session pooler':"
            echo "::error::  1. https://supabase.com/dashboard/project/maqlnsivmreagpkhbkbn/settings/database"
            echo "::error::  2. 'Connection string' → tab 'Session' (porta 5432, host aws-0-...pooler.supabase.com)"
            echo "::error::  3. Atualiza o secret SUPABASE_DB_URL com a nova URI"
            exit 1
          fi

      - name: Test connection
        env:
          PGSSLMODE: require
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Testando conexão com o banco…"
          DB_URL_TRIM=$(echo "$DB_URL" | xargs)
          if [ -z "$DB_URL_TRIM" ]; then
            echo "::error::DB_URL chegou vazia no test step."
            exit 1
          fi
          # Conecta mostrando erro completo do psql
          psql "$DB_URL_TRIM" -c "SELECT version();" 2>&1 || {
            echo ""
            echo "::error::Falha ao conectar com o banco."
            echo ""
            echo "Causas comuns:"
            echo "1. Você copiou 'Direct Connection' (db.X.supabase.co) — só IPv6. Use 'Session pooler' (porta 5432)"
            echo "2. Senha errada na URI"
            echo "3. Caracteres especiais na senha precisam URL-encode (@→%40, :→%3A, etc.)"
            exit 1
          }

      - name: Setup migrations tracking table
        env:
          PGSSLMODE: require
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$DB_URL" <<'SQL'
            CREATE TABLE IF NOT EXISTS public._supabase_migrations (
              name TEXT PRIMARY KEY,
              applied_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );
          SQL
          echo "✓ Tabela de tracking pronta"

      - name: List pending migrations
        id: pending
        env:
          PGSSLMODE: require
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "### Migrations no repo:"
          ls -la supabase/migrations/*.sql 2>/dev/null || { echo "Nenhuma migration encontrada."; exit 0; }
          echo ""

          echo "### Já aplicadas no banco:"
          psql "$DB_URL" -t -c "SELECT name FROM public._supabase_migrations ORDER BY name;" || true
          echo ""

          PENDING=()
          for f in supabase/migrations/*.sql; do
            NOME=$(basename "$f")
            JA_APLICADA=$(psql "$DB_URL" -t -c "SELECT 1 FROM public._supabase_migrations WHERE name='$NOME';" | tr -d ' \n')
            if [ -z "$JA_APLICADA" ]; then
              PENDING+=("$f")
              echo "📝 PENDENTE: $NOME"
            else
              echo "✓ já aplicada: $NOME"
            fi
          done

          echo ""
          echo "Total pendentes: ${#PENDING[@]}"

          # Exporta lista pra próximo step
          printf '%s\n' "${PENDING[@]}" > /tmp/pending.txt
          echo "count=${#PENDING[@]}" >> $GITHUB_OUTPUT

      - name: Apply pending migrations
        if: ${{ github.event.inputs.dry_run != 'true' && steps.pending.outputs.count != '0' }}
        env:
          PGSSLMODE: require
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -e
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            NOME=$(basename "$f")
            echo ""
            echo "═══════════════════════════════════════════════"
            echo "▶ Aplicando: $NOME"
            echo "═══════════════════════════════════════════════"
            psql "$DB_URL" -v ON_ERROR_STOP=1 -f "$f"
            psql "$DB_URL" -c "INSERT INTO public._supabase_migrations (name) VALUES ('$NOME') ON CONFLICT DO NOTHING;"
            echo "✓ $NOME aplicada e registrada"
          done < /tmp/pending.txt
          echo ""
          echo "🎉 Todas as migrations aplicadas com sucesso"

      - name: Dry-run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "::warning::Dry-run ativado — nada foi aplicado."
          echo "Pra aplicar de verdade, re-rode sem dry_run ou faça push pra main."

      - name: No pending
        if: ${{ steps.pending.outputs.count == '0' }}
        run: |
          echo "✓ Nenhuma migration pendente. Banco já está atualizado."

      - name: Summary
        if: always()
        env:
          PGSSLMODE: require
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "## Resumo" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Trigger: \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Dry-run: \`${{ github.event.inputs.dry_run || 'false' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Pendentes detectadas: \`${{ steps.pending.outputs.count || 0 }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Migrations aplicadas (todas)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          psql "$DB_URL" -c "SELECT name, applied_at FROM public._supabase_migrations ORDER BY applied_at DESC LIMIT 10;" 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "(não foi possível ler)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
