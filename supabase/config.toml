# AF4 Cockpit · Supabase project config
# Docs: https://supabase.com/docs/guides/local-development/cli/config

# Project ID (do dashboard). Usado pelo `supabase link --project-ref <id>`
project_id = "maqlnsivmreagpkhbkbn"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://af4cockpit.p-afonso.workers.dev"
additional_redirect_urls = ["http://localhost:5173", "https://af4cockpit.p-afonso.workers.dev"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false  # true em produção

[auth.email.template.recovery]
subject = "Recupere sua senha do AF4 Cockpit"

[edge_runtime]
enabled = false
