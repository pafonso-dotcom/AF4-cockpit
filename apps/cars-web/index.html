    <script>
      // Kill-switch: adicione ?nosw=1 ao final da URL pra forçar
      // desregistro do SW e limpar caches (útil em iPad com versão
      // antiga travada).
      (function () {
        var params = new URLSearchParams(location.search);
        if (params.has("nosw") && "serviceWorker" in navigator) {
          Promise.all([
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (r) { return r.unregister(); }));
            }),
            (typeof caches !== "undefined" && caches.keys)
              ? caches.keys().then(function (ks) {
                  return Promise.all(ks.map(function (k) { return caches.delete(k); }));
                })
              : Promise.resolve(),
          ]).then(function () {
            location.replace(location.origin + location.pathname);
          });
          return;
        }

        // Registro normal do SW (só em produção)
        if ("serviceWorker" in navigator && location.hostname !== "localhost") {
          window.addEventListener("load", function () {
            navigator.serviceWorker.register("./sw.js").catch(function () {});
          });
        }
      })();
    </script>
  </body>
